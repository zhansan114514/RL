seed: 42

inference:
  max_model_len: 4096
  gpu_memory_utilization: 0.45
  dtype: auto

training:
  lora_r: 256
  learning_rate: 5.0e-5
  batch_size: 4
  num_epochs: 1

api:
  api_base: "https://api.labforge.top"
  api_model: "gpt5.5"
  request_timeout: 60
  retry_delay: 5
  max_retries: 5
  api_temperature: 0.1

data:
  mmlu:
    load_mode: "by_subject"

sampling:
  train:
    strategy: "full"
    max_samples: null
    seed_offset: 0
  validation:
    strategy: "full"
    max_samples: null
    seed_offset: 1
  test:
    strategy: "full"
    max_samples: null
    seed_offset: 2
