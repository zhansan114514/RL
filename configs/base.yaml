# ACC-Collab 全局默认配置

defaults:
  - _self_

# 实验基础设置
seed: 42
experiment_name: "acc-collab"
wandb_project: "acc-collab"
log_dir: "experiments/logs"

# 审议参数
deliberation:
  num_rounds: 5        # T+1 轮, t=0..4
  reward_threshold: 0.0  # ε
  num_simulations: 5    # Monte Carlo roll-out 次数

# 训练参数
training:
  lora_r: 256
  lora_alpha: 512
  nll_weight: 1.0
  learning_rate: 5e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  warmup_ratio: 0.1
  beta: 0.1  # DPO beta参数，控制从参考策略偏离的程度
