# DPO training config for Critic

training:
  agent: "critic"
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  warmup_ratio: 0.1
  beta: 0.1
  loss_type: "sigmoid"        # standard DPO loss
  optim: "adamw_torch"
  weight_decay: 0.01
  max_grad_norm: 1.0          # gradient clipping for FP16 stability
  save_strategy: "epoch"
  # bf16 由代码根据硬件自动检测，不在此硬编码
