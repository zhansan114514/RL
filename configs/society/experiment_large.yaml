# Qwen3-14B + MMLU large experiment, n=1000
# Full 6-phase Diverse Actor-Critic Society run.
# Provider credentials/endpoints are loaded from configs/local.yaml.

api:
  provider: "glm"  # "glm" or "gpt"; provider details live in configs/local.yaml

common:
  schema_version: 3
  model_name: "Qwen/Qwen3-14B"
  base_model: "Qwen/Qwen3-14B"
  dataset: "mmlu"
  cache_dir: "output/society_mmlu_large_n1000_style3_qwen3"
  seed: 42
  device: 7
  dtype: "bfloat16"
  gpu_memory_utilization: 0.75
  max_model_len: 4096

data:
  mmlu:
    load_mode: "by_subject"

sampling:
  train:
    strategy: "random"
    max_samples: 1000
    seed_offset: 0
  validation:
    strategy: "stratified_by_subject"
    max_samples: 1000
    seed_offset: 1
  test:
    strategy: "full"
    max_samples: null
    seed_offset: 2

# Phase 1: Actor SFT candidate generation
step01_bootstrap:
  output_dir: "output/society_mmlu_large_n1000_style3_qwen3/bootstrap"
  source_splits: ["dev", "validation"]
  subject_balanced: true
  min_subjects: 57
  max_samples_per_subject: 20
  max_samples: 1000
  reasoning_styles: ["direct", "evidence", "elimination"]
  temperatures: [0.4, 0.7, 1.0, 1.2]
  generations_per_temperature: 1
  top_p: 0.8
  max_tokens: 384
  batch_size: 4

# Phase 2: Data classification
step02_classify:
  input_dir: "output/society_mmlu_large_n1000_style3_qwen3/bootstrap"
  output_dir: "output/society_mmlu_large_n1000_style3_qwen3/classified"
  batch_size: 20
  request_timeout: 120
  retry_delay: 5
  max_retries: 5
  api_temperature: 0.1
  strict_classification: true
  max_classification_failure_rate: 0.011
  use_batch_api: true
  batch_api_max_responses: 20
  max_workers: 8
  reasoning_styles: ["direct", "evidence", "elimination"]
  error_dimensions: ["reasoning", "knowledge", "grounding", "verification"]
  min_style_confidence: 0.60
  min_error_confidence: 0.5

# Phase 3: Actor SFT training
step03_train_actors_sft:
  input_dir: "output/society_mmlu_large_n1000_style3_qwen3/classified"
  output_dir: "output/society_mmlu_large_n1000_style3_qwen3/actors"
  reasoning_styles: ["direct", "evidence", "elimination"]
  min_style_confidence: 0.55
  min_examples_per_actor: 256
  max_examples_per_question_style: 2
  balance_by_subject: true
  min_subject_coverage: 55
  max_style_imbalance_ratio: 1.5
  max_subject_imbalance_ratio: 3.0
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0

# Phase 4: Critic SFT training
step04_diversify_critics:
  input_dir: "output/society_mmlu_large_n1000_style3_qwen3/classified"
  actor_base_dir: "output/society_mmlu_large_n1000_style3_qwen3/actors"
  output_dir: "output/society_mmlu_large_n1000_style3_qwen3/critics"
  critic_skills: ["reasoning", "knowledge", "grounding", "verification"]
  max_samples: 1000
  max_examples_per_critic: 512
  min_examples_per_critic: 256
  correction_ratio: 0.55
  keep_ratio: 0.45
  summary_mode: rule
  validate_revision: true
  fail_on_low_data: true
  actor_max_tokens: 256
  revision_max_tokens: 256
  summary_max_chars_per_actor: 500
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  max_lora_rank: 256
  tensor_parallel_size: 1

# Phase 5: Society alternating training
step05_train_society:
  actor_base_dir: "output/society_mmlu_large_n1000_style3_qwen3/actors"
  critic_base_dir: "output/society_mmlu_large_n1000_style3_qwen3/critics"
  output_dir: "output/society_mmlu_large_n1000_style3_qwen3/society"
  num_iterations: 1
  num_rounds: 3
  num_simulations: 3
  max_samples: 1000
  trajectory_max_tokens: 256
  reward_threshold: 0.0
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  beta: 0.1
  min_pairs_per_critic: 256
  min_pairs_per_actor: 256
  min_unique_pairs_per_critic: 256
  max_critic_pair_duplicate_rate: 0.0
  min_specialty_items: 64
  min_specialty_ratio: 0.05
  specialty_ratio: 0.60
  general_ratio: 0.30
  calibration_ratio: 0.10
  checkpoint_dir: "output/society_mmlu_large_n1000_style3_qwen3/checkpoints"
  actor_temperature: 0.7
  actor_max_tokens: 256
  critic_max_tokens: 256
  min_style_confidence: 0.60
  allow_skip_low_data: false
  max_actor_fallback_ratio: 0.5
  strict_classification: true
  max_classification_failure_rate: 0.01
  max_classification_workers: 16
  tensor_parallel_size: 1
  retry_delay: 5
  max_retries: 5
  api_temperature: 0.1

# Phase 6: Evaluation + ablation
step06_evaluate:
  society_dir: "output/society_mmlu_large_n1000_style3_qwen3/society"
  output_dir: "output/society_mmlu_large_n1000_style3_qwen3/eval"
  evaluation_mode: "dual_gpu"  # "single_gpu" or "dual_gpu"
  evaluation_modes:
    single_gpu:
      devices: [7]
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.65
    dual_gpu:
      devices: [1, 2]
      tensor_parallel_size: 2
      gpu_memory_utilization: 0.65
  sampling:
    test:
      strategy: "random"
      max_samples: 500
      seed_offset: 2
  num_rounds: 3
  max_tokens: 256
  temperature: 0.0
  run_ablations: true
  num_samples_for_qualitative: 10
  max_lora_rank: 256
  router_top_k: 2
  router_min_confidence: 0.1
  router_fallback_to_uniform: false
  route_feedback_to_actor: true
  consensus_uses_selected_critics_only: false
  eval_batch_size: 8

router:
  top_k: 2
  min_confidence: 0.1
  fallback_to_uniform: false
  route_feedback_to_actor: true
  consensus_uses_selected_critics_only: false
