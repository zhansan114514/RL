# Qwen2.5-7B-Instruct + MMLU large experiment, n=1000
# Full 6-phase Diverse Actor-Critic Society run.
# Provider credentials/endpoints are loaded from configs/local.yaml.

api:
  provider: "gpt"  # "glm" or "gpt"; provider details live in configs/local.yaml

common:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  dataset: "mmlu"
  cache_dir: "output/society_mmlu_large_n1000"
  seed: 42
  max_samples: 1000
  device: 4
  dtype: "bfloat16"
  gpu_memory_utilization: 0.80
  max_model_len: 4096

# Phase 1: Bootstrap data generation
step01_bootstrap:
  output_dir: "output/society_mmlu_large_n1000/bootstrap"
  num_agents: 5
  num_debate_rounds: 2
  temperature: 0.8
  max_tokens: 256
  batch_size: 8

# Phase 2: Data classification
step02_classify:
  input_dir: "output/society_mmlu_large_n1000/bootstrap"
  output_dir: "output/society_mmlu_large_n1000/classified"
  batch_size: 20
  request_timeout: 120
  retry_delay: 5
  max_retries: 5
  api_temperature: 0.1
  strict_classification: true
  max_classification_failure_rate: 0.0
  use_batch_api: true
  batch_api_max_responses: 20
  max_workers: 8

# Phase 3: Actor diversification
step03_diversify_actors:
  input_dir: "output/society_mmlu_large_n1000/classified"
  output_dir: "output/society_mmlu_large_n1000/actors"
  reasoning_styles: ["algebraic", "direct", "backtracking"]
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  beta: 0.1

# Phase 4: Critic diversification
step04_diversify_critics:
  input_dir: "output/society_mmlu_large_n1000/classified"
  actor_base_dir: "output/society_mmlu_large_n1000/actors"
  output_dir: "output/society_mmlu_large_n1000/critics"
  critic_skills: ["reasoning", "knowledge", "computation", "verification"]
  max_delib_samples: 1000
  num_rounds: 5
  num_simulations: 5
  max_tokens: 256
  reward_threshold: 0.0
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  beta: 0.1
  min_pairs_per_critic: 256
  min_specialty_items: 64
  min_specialty_ratio: 0.05
  specialty_ratio: 0.60
  general_ratio: 0.30
  calibration_ratio: 0.10
  max_lora_rank: 256
  strict_classification: true
  max_classification_failure_rate: 0.0
  max_classification_workers: 8
  request_timeout: 120
  retry_delay: 5
  max_retries: 5
  api_temperature: 0.1

# Phase 5: Society alternating training
step05_train_society:
  actor_base_dir: "output/society_mmlu_large_n1000/actors"
  critic_base_dir: "output/society_mmlu_large_n1000/critics"
  output_dir: "output/society_mmlu_large_n1000/society"
  num_iterations: 1
  num_rounds: 5
  num_simulations: 5
  max_samples: 1000
  trajectory_max_tokens: 256
  reward_threshold: 0.0
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  batch_size: 4
  gradient_accumulation_steps: 4
  num_epochs: 1
  max_length: 2048
  beta: 0.1
  min_pairs_per_critic: 256
  min_specialty_items: 64
  min_specialty_ratio: 0.05
  specialty_ratio: 0.60
  general_ratio: 0.30
  calibration_ratio: 0.10
  checkpoint_dir: "output/society_mmlu_large_n1000/checkpoints"
  actor_temperature: 0.7
  actor_max_tokens: 256
  critic_max_tokens: 256
  strict_classification: true
  max_classification_failure_rate: 0.0
  max_classification_workers: 8
  request_timeout: 120
  retry_delay: 5
  max_retries: 5
  api_temperature: 0.1

# Phase 6: Evaluation + ablation
step06_evaluate:
  society_dir: "output/society_mmlu_large_n1000/society"
  output_dir: "output/society_mmlu_large_n1000/eval"
  evaluation_mode: "single_gpu"  # "single_gpu" or "dual_gpu"
  evaluation_modes:
    single_gpu:
      devices: [4]
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.65
    dual_gpu:
      devices: [4, 5]
      tensor_parallel_size: 2
      gpu_memory_utilization: 0.80
  max_samples: 1000
  num_rounds: 5
  max_tokens: 256
  temperature: 0.0
  run_ablations: true
  num_samples_for_qualitative: 10
  max_lora_rank: 256
  router_top_k: 2
