# Single H100 80GB experiment configuration
# Qwen2.5-7B-Instruct, MATH dataset

common:
  model_name: "Qwen/Qwen2.5-7B-Instruct"
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  dataset: "math"
  cache_dir: "output/society"
  seed: 42
  max_samples: 5
  device: 6
  dtype: "bfloat16"
  gpu_memory_utilization: 0.65

# Phase 1: Bootstrap data generation
step01_bootstrap:
  output_dir: "output/society/bootstrap"
  num_agents: 5              # N=5 independent responses per sample
  num_debate_rounds: 2       # M=2 rounds of simulated debate
  temperature: 0.8
  max_tokens: 512

# Phase 2: Data classification
step02_classify:
  input_dir: "output/society/bootstrap"
  output_dir: "output/society/classified"

# Phase 3: Actor diversification
step03_diversify_actors:
  input_dir: "output/society/classified"
  output_dir: "output/society/actors"
  reasoning_styles: ["algebraic", "direct", "backtracking"]
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  beta: 0.1
  batch_size: 4
  num_epochs: 1
  max_length: 2048

# Phase 4: Critic diversification
step04_diversify_critics:
  input_dir: "output/society/classified"
  output_dir: "output/society/critics"
  critic_skills: ["computation", "reasoning", "knowledge", "verification"]
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  beta: 0.1
  batch_size: 4
  num_epochs: 1
  max_length: 2048

# Phase 5: Society alternating training
step05_train_society:
  num_iterations: 1             # 1 = ACC-Collab, 2 = ACC-Collab+
  num_rounds: 5
  num_simulations: 5
  reward_threshold: 0.0
  lora_r: 256
  lora_alpha: 512
  learning_rate: 5.0e-5
  beta: 0.1
  batch_size: 4
  num_epochs: 1
  max_length: 2048
  checkpoint_dir: "output/society/checkpoints"

# Phase 6: Evaluation
step06_evaluate:
  society_dir: "output/society/society"
  output_dir: "output/society/eval"
  num_rounds: 2
  max_tokens: 512
  temperature: 0.7

# Estimated runtime: ~17-22 hours (200 samples, 5 rounds, 1 iteration)
