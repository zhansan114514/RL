# 4 Critics with distinct error-type specialties
# Each trains on its error-type subset (data-level diversification)

critics:
  critic_arithmetic:
    error_specialty: "arithmetic"
    model_path: "Qwen/Qwen2.5-7B-Instruct"
    lora_path: "cache/society/critics/critic_arithmetic/adapter"
