# Experiment: Qwen3-4B + ARC-Challenge
# Dual H100 GPU (Actor on GPU 5, Critic on GPU 6), 1 iteration, 5 rounds, 5 simulations, 300 samples
# Optimized: CUDA Graphs enabled, 0.90 GPU util per card

common:
  cache_dir: "experiments/qwen3_arc"
  model_name: "Qwen/Qwen3-4B-Instruct-2507"
  dataset: "arc"
  seed: 42
  max_samples: 300
  use_wandb: false

step01:
  output_dir: "experiments/qwen3_arc/trajectories"
  num_rounds: 5
  num_simulations: 5
  reward_threshold: 0.0
  max_tokens: 256
  temperature: 0.7
  actor_device: 5
  critic_device: 6
  dtype: "bfloat16"
  gpu_memory_utilization: 0.90

step02:
  input_dir: "experiments/qwen3_arc/trajectories"
  output_dir: "experiments/qwen3_arc/preferences"
  min_delta: 0.0

step03:
  preference_dir: "experiments/qwen3_arc/preferences"
  output_dir: "experiments/qwen3_arc/models/critic"
  model_type: null
  lora_r: 256
  learning_rate: 5.0e-5
  batch_size: 4
  num_epochs: 1
  max_length: 1024

step04:
  preference_dir: "experiments/qwen3_arc/preferences"
  output_dir: "experiments/qwen3_arc/models/actor"
  model_type: null
  lora_r: 256
  learning_rate: 5.0e-5
  batch_size: 4
  num_epochs: 1
  max_length: 1024

step05:
  actor_path: "experiments/qwen3_arc/models/actor"
  critic_path: "experiments/qwen3_arc/models/critic"
  output_dir: "experiments/qwen3_arc/eval"
  num_rounds: 5
  max_tokens: 256
  temperature: 0.7
  actor_device: 5
  critic_device: 6
  dtype: "bfloat16"
  gpu_memory_utilization: 0.90

step06:
  output_dir: "experiments/qwen3_arc/full_pipeline"
  num_iterations: 1
  num_rounds: 5
  lora_r: 256
  learning_rate: 5.0e-5
  batch_size: 8
  num_epochs: 1
  num_simulations: 5
  reward_threshold: 0.0
  skip_training: false
  reuse_trajectories: true
  actor_device: 5
  critic_device: 6
  dtype: "bfloat16"
  gpu_memory_utilization: 0.90
  max_model_len: 4096
