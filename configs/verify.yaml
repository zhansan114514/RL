# 验证配置 - 3样本小规模测试管线可行性
common:
  model_name: "google/gemma-2-2b-it"
  dataset: "boolq"
  seed: 42
  max_samples: 3
  use_wandb: false

step06:
  output_dir: "experiments/verify_3samples"
  num_iterations: 1
  num_rounds: 2
  lora_r: 256
  learning_rate: 5.0e-5
  batch_size: 2
  num_epochs: 1
  num_simulations: 2
  reward_threshold: 0.0
  skip_training: false
  actor_device: 5
  critic_device: 6
  dtype: "float32"
  gpu_memory_utilization: 0.45
  max_model_len: 4096
